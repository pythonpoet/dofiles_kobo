name: Build kobo-clara-2e
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU armv7 binfmt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static
          cat /proc/sys/fs/binfmt_misc/qemu-arm

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            extra-platforms = armv7l-linux aarch64-linux

      - uses: cachix/cachix-action@v15
        with:
          name: dotfilekoboc17cb2c57affa23f8de7 # replace with your cachix cache name
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build kobo-clara-2e
        run: nix build .#hydraJobs.kobo-clara-2e
