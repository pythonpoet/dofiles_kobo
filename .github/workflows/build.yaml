name: Build kobo-clara-2e
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU armv7 binfmt
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static

          # Check if qemu-arm is already registered
          if [ ! -e /proc/sys/fs/binfmt_misc/qemu-arm ]; then
            echo "Registering qemu-arm binfmt..."
            echo ':qemu-arm:M::\x7fELF\x01\x01\x01\x00\x00\x00\x00\x00\x00\x00\x00\x00\x02\x00\x28\x00:\xff\xff\xff\xff\xff\xff\xff\x00\xff\xff\xff\xff\xff\xff\xff\xff\xfe\xff\xff\xff:/usr/bin/qemu-arm-static:F' \
              | sudo tee /proc/sys/fs/binfmt_misc/register
          else
            echo "qemu-arm already registered, skipping registration."
          fi

          # Output current status for verification
          cat /proc/sys/fs/binfmt_misc/qemu-arm

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            extra-platforms = armv7l-linux aarch64-linux
            system-features = benchmark big-parallel nixos-test uid-range gccarch-armv7-a
            substituters = https://cache.tectonic.brianmckenna.org/ https://cache.nixos.org/
            trusted-public-keys = cache.tectonic.brianmckenna.org-1:JJgVJfP+41bQvmahw1MW8hIWkPTsaX2T+19rY5eOXPk= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            always-allow-substitutes = true

      - uses: cachix/cachix-action@v15
        with:
          name: dotfilekoboc17cb2c57affa23f8de7
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build SD Image
        id: build
        run: |
          nix build .#hydraJobs.kobo-clara-2e -L --keep-going
          # Confirm result exists
          find result -type f -name "*.img" -ls

      - name: Compress Image
        id: compress
        run: |
          # Find and compress the raw image
          IMG_PATH=$(find result -name "*.img" -type f)
          XZ_PATH="${IMG_PATH}.xz"
          pixz -9 "$IMG_PATH"  # parallel xz (faster)
          echo "XZ_PATH=${XZ_PATH}" >> $GITHUB_OUTPUT

      - name: Generate Checksum
        id: checksum
        run: |
          XZ_PATH="${{ steps.compress.outputs.XZ_PATH }}"
          sha256sum "$XZ_PATH" > sha256sums.txt
          echo "Checksum generated:"
          cat sha256sums.txt
          echo "CHECKSUM_FILE=sha256sums.txt" >> $GITHUB_OUTPUT

      - name: Upload Artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: sd-image-artifact
          path: |
            ${{ steps.compress.outputs.XZ_PATH }}
            ${{ steps.checksum.outputs.CHECKSUM_FILE }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kobo Clara HD Release - ${{ github.sha }}"
          tag_name: ${{ github.sha }}
          draft: false
          prerelease: false
          body: |
            This release contains a flashable SD card image for the **Kobo Clara HD (armv7l)**.

            ### 📥 How to Flash

            #### Using `dd` (Linux/macOS):
            ```bash
            unxz kobo-clara-2e.img.xz
            sudo dd if=kobo-clara-2e.img of=/dev/sdX bs=4M status=progress
            sync
            ```

            #### Using Balena Etcher:
            - Download [Balena Etcher](https://www.balena.io/etcher/)
            - Open the `.img.xz` file directly
            - Flash to SD card

            ### ✅ Verify Integrity
            ```bash
            sha256sum -c sha256sums.txt
            # Output: kobo-clara-2e.img.xz: OK
            ```

            **Built from commit:** ${{ github.sha }}

            Auto-generated by GitHub Actions.
          files: |
            ${{ steps.compress.outputs.XZ_PATH }}
            ${{ steps.checksum.outputs.CHECKSUM_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
